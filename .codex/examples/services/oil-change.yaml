id: service-oil-change
name: 엔진오일 교환
category: maintenance
description: |
  엔진오일 및 오일 필터 교환. 차량 매뉴얼 권장 주기 기준 5,000-15,000km.
base_price_krw:
  min: 60000
  max: 120000
base_duration_min: 30
procedure_ids:
  - oil-change-gasoline
applicable_to:
  fuels: [gasoline, hev, lpg]
notes: |
  LPG/디젤은 별도 서비스로 분리 권장.
  합성유 사용 시 단가 상승. 차종별 오일 규격 확인 필수.