$schema: "http://json-schema.org/draft-07/schema#"
title: DTC
description: OBD-II 표준 또는 제조사 공개 진단 코드. 단순화 금지 — 가능성 트리.

type: object
required: [id, type, title, description, possible_causes, diagnostic_steps]
additionalProperties: false

properties:
  id:
    type: string
    pattern: "^[PCBU][0-9A-F]{4}$"
    description: OBD-II 형식 (예: P0420)

  type:
    type: string
    enum: [generic, manufacturer_specific]

  manufacturer:
    type: string
    description: 제조사 특정 코드일 경우 제조사명

  title:
    type: string
    description: 한 줄 요약 (한국어)

  description:
    type: string
    description: 코드 의미와 영향 (2-3 문장)

  affected_systems:
    type: array
    items:
      type: string
      enum: [emissions, fuel, ignition, transmission, abs, srs, hvac, body, network, hybrid, ev_battery, other]

  possible_causes:
    type: array
    minItems: 2
    description: 가능성 트리. 최소 2개 이상.
    items:
      type: object
      required: [cause, likelihood]
      properties:
        cause: { type: string }
        likelihood: { type: string, enum: [very_common, common, occasional, rare] }
        notes: { type: string }

  diagnostic_steps:
    type: array
    minItems: 1
    items:
      type: object
      required: [step, action]
      properties:
        step: { type: integer, minimum: 1 }
        action: { type: string }
        if_pass: { type: string }
        if_fail: { type: string }

  typical_repair_cost_krw:
    type: object
    properties:
      min: { type: integer }
      max: { type: integer }

  references:
    type: array
    items: { type: string }