$schema: "http://json-schema.org/draft-07/schema#"
title: Scenario
description: 한 손님 응대 = 한 시나리오. 5분 이내 완결 (헌장 원칙 3).

type: object
required: [id, title, customer_id, vehicle_id, presented_problem, actual_issues, estimated_duration_min]
additionalProperties: false

properties:
  id:
    type: string
    pattern: "^[a-z0-9-]+$"

  title:
    type: string
    description: 시나리오 제목 (예: 장마철 와이퍼 교체 문의)

  customer_id:
    type: string

  vehicle_id:
    type: string
    description: 이번에 가져온 차량. 손님 보유 차량과 다를 수 있음.

  presented_problem:
    type: string
    description: 손님이 처음 말하는 증상 (실제 손님 말투로)

  actual_issues:
    type: array
    minItems: 1
    description: 실제 문제 (DTC 또는 자유 서술)
    items:
      type: object
      required: [description, severity]
      properties:
        dtc_id: { type: string }
        description: { type: string }
        severity: { type: string, enum: [cosmetic, minor, moderate, major, safety_critical] }

  diagnostic_hints:
    type: array
    description: 정비사가 발견할 수 있는 단서 (소리, 냄새, 시각, 시운전 등)
    items: { type: string }

  required_repairs:
    type: array
    items:
      type: object
      required: [action]
      properties:
        action: { type: string }
        part_needed: { type: string }
        estimated_time_min: { type: integer }

  estimated_duration_min:
    type: integer
    minimum: 1
    maximum: 5
    description: 한 사이클 최대 5분 (헌장 원칙 3)

  difficulty:
    type: integer
    minimum: 1
    maximum: 5

  season:
    type: string
    enum: [any, spring, summer, rainy_season, autumn, winter, cold_snap, dust_season]
    default: any

  tags:
    type: array
    items: { type: string }