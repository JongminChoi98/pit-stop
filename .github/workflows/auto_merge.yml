name: auto_merge

# auto-mergeable 라벨이 붙은 PR에 GitHub native auto-merge 활성화.
# 활성화만 시키고 끝남. 실제 머지는 GitHub이 처리:
#   - branch protection의 required checks가 모두 통과
#   - 충돌 없음
#   - 위 조건 충족 시 자동으로 squash 머지 + 브랜치 삭제

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: GitHub native auto-merge 활성화
    if: contains(github.event.pull_request.labels.*.name, 'auto-mergeable')
    runs-on: ubuntu-latest
    steps:
      - name: auto-merge 활성화 (squash + 브랜치 삭제)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          echo "PR #$PR — auto-merge 활성화 시도"

          # 1. PR 상태 확인 (이미 닫혔거나 머지됐으면 스킵)
          STATE=$(gh pr view "$PR" --repo "$REPO" --json state -q .state)
          if [ "$STATE" != "OPEN" ]; then
            echo "PR 상태가 OPEN이 아님 ($STATE). 스킵."
            exit 0
          fi

          # 2. Draft PR 스킵 (ready_for_review 후에 다시 트리거됨)
          IS_DRAFT=$(gh pr view "$PR" --repo "$REPO" --json isDraft -q .isDraft)
          if [ "$IS_DRAFT" = "true" ]; then
            echo "Draft PR. Ready for review로 전환 시 재시도됨. 스킵."
            exit 0
          fi

          # 3. auto-merge 활성화
          if gh pr merge "$PR" --repo "$REPO" --auto --squash --delete-branch; then
            echo "✓ Auto-merge 활성화 완료"
            echo "Required checks 통과 시 GitHub이 자동으로 머지합니다."
          else
            echo "::warning::Auto-merge 활성화 실패. 가능한 원인:"
            echo "  - Branch protection 설정 부재"
            echo "  - 저장소 설정에서 auto-merge 비활성화"
            echo "  - 권한 부족"
            exit 1
          fi